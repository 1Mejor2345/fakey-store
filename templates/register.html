{% extends 'layout.html' %}

{% block title %}
    Register
{% endblock %}

{% block body %}
    <div class="card shadow-sm bg-body-tertiary border-0 mx-auto mt-5" style="max-width: 400px;">
        <div class="card-body p-4 p-sm-5">
            <h3 class="card-title text-center mb-4">Create an Account</h3>

            <form action="/register" method="post">
                <div class="form-floating mb-3">
                    <input autocomplete="off" autofocus class="form-control" id="username" name="username" placeholder="Username" type="text">
                    <label for="username" class="text-muted">Username</label>
                </div>

                <div class="form-floating mb-3">
                    <input class="form-control" id="password" name="password" placeholder="Password" type="password">
                    <label for="password" class="text-muted">Password</label>
                </div>

                <div class="form-floating mb-5">
                    <input class="form-control" id="confirmation" name="confirmation" placeholder="Confirm Password" type="password">
                    <label for="confirmation" class="text-muted">Confirm Password</label>
                </div>

                <button class="btn btn-primary btn-md w-100 fw-bold" type="submit">Register</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0">Already have an account? <a href="/login" class="text-decoration-none">Log In</a></p>
            </div>
        </div>
    </div>
{% endblock %}
