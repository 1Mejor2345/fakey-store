{% extends 'layout.html' %}

{% block title %}
    Index
{% endblock %}

{% block body %}
    <div class="bg-light p-4 mb-4 rounded shadow-sm border">
        <div class="row justify-content-center mb-3">
            <div class="col-12 col-md-8 col-lg-6">
                <input class="form-control form-control-lg rounded-pill px-4 border-secondary" id="search-input" type="search" placeholder="Search products, brands, or descriptions..." aria-label="Search"/>
            </div>
        </div>
        <div id="categories-container" class="d-flex flex-wrap justify-content-center gap-2 mt-3"></div>
    </div>
    <div id="container-products" class="row row-cols-2 row-cols-md-4 g-4 mb-4"></div>
    <button id="load-more" class="btn btn-primary">Load More Products</button>

    <script>
        const containerProductsDiv = document.querySelector("#container-products");
        const loadMoreButton = document.querySelector("#load-more");
        const productsList = {{ products | tojson }};
        const searchInput = document.querySelector("#search-input");
        const categoriesContainer = document.querySelector("#categories-container");
        const categories = Array.from(new Set(productsList.map((product) => product["category"]).join(",").split(",")))
        let currentList = productsList;
        let selectedValues = categories;

        let startingIndex = 0;
        let endingIndex = 30;

        const fetchMoreProducts = () => {
            startingIndex += 30;
            endingIndex += 30;

            displayProducts(currentList.slice(startingIndex, endingIndex));
            if (endingIndex >= currentList.length) {
                loadMoreButton.disabled = true;
                loadMoreButton.textContent = "No more products to display.";
            }
        }

        const displayProducts = (productsChunk) => {
            let htmlString = "";

            productsChunk.forEach(({ id, title, description, category, price, discountPercentage, rating, stock, tags, brand, weight, dimensions, warrantyInformation, shippingInformation, availabilityStatus, reviews, returnPolicy, images, thumbnail}) => {
                let index = id - 1;

                let carouselItems = images.map((img, i) => `
                    <div class="carousel-item ${i === 0 ? 'active' : ''}">
                        <img src="${img}" class="d-block w-100" alt="Image of ${title}" style="height: 300px; object-fit: contain; background-color: #f8f9fa; padding: 5px;">
                    </div>
                `).join('');

                let reviewsHTML = "<p class='text-muted small'>No reviews yet.</p>";
                if (reviews && reviews.length > 0) {
                    reviewsHTML = reviews.map(r => `
                        <div class="card mb-2 border-0 bg-light shadow-sm">
                            <div class="card-body p-2">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <strong class="small">${r.reviewerName}</strong>
                                    <span class="badge bg-warning text-dark">${r.rating} ★</span>
                                </div>
                                <p class="card-text small mb-1">"${r.comment}"</p>
                                <small class="text-muted" style="font-size: 0.75rem;">${new Date(r.date).toLocaleDateString()}</small>
                            </div>
                        </div>
                    `).join('');
                }

                let dimText = dimensions ? `${dimensions.width}W x ${dimensions.height}H x ${dimensions.depth}D` : "N/A";
                let tagsText = Array.isArray(tags) ? tags.join(", ") : tags;

                htmlString += `
                    <div class="col">
                        <div id="product-${id}" class="card h-100 shadow-sm">
                            <img src="${thumbnail}" class="card-img-top" alt="${title} thumbnail" style="height: 200px; object-fit: contain; display: block; margin: auto; padding-top: 15px;">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title text-truncate" title="${title}">${title}</h5>
                                <p class="card-text text-success fs-5"><strong>$${price}</strong></p>
                                <p class="card-text"><small class="text-muted">${brand} | ${category}</small></p>

                                <button id="btn-${index}" class="btn btn-outline-primary mt-auto fw-bold" data-bs-toggle="modal" data-bs-target="#modal-${id}">See Details</button>

                                <div class="modal fade" id="modal-${id}" tabindex="-1" aria-hidden="true">
                                    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                                        <div class="modal-content">

                                            <div class="modal-header border-0 pb-0">
                                                <h1 class="modal-title fs-5 fw-bold">${title}</h1>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                            </div>

                                            <div class="modal-body p-0">
                                                <div id="carousel-${id}" class="carousel slide carousel-dark" data-bs-ride="carousel">
                                                    <div class="carousel-inner border-bottom">
                                                        ${carouselItems}
                                                    </div>
                                                    <button class="carousel-control-prev" type="button" data-bs-target="#carousel-${id}" data-bs-slide="prev">
                                                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                                        <span class="visually-hidden">Previous</span>
                                                    </button>
                                                    <button class="carousel-control-next" type="button" data-bs-target="#carousel-${id}" data-bs-slide="next">
                                                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                                        <span class="visually-hidden">Next</span>
                                                    </button>
                                                </div>

                                                <div class="p-3">
                                                    <h3 class="text-success fw-bold mb-2">$${price} <span class="badge bg-secondary fs-6 align-middle">${stock} available</span></h3>
                                                    <p class="text-muted small">${description}</p>

                                                    <div class="row text-muted small mb-3 border-top border-bottom py-2">
                                                        <div class="col-6"><p class="mb-1"><strong>Shipping: </strong>${shippingInformation}</p></div>
                                                        <div class="col-6"><p class="mb-1"><strong>Warranty: </strong>${warrantyInformation}</p></div>
                                                        <div class="col-6"><p class="mb-1"><strong>Rating: </strong>${rating} / 5.00</p></div>
                                                        <div class="col-6"><p class="mb-1"><strong>Tags: </strong>${tagsText}</p></div>
                                                        <div class="col-6"><p class="mb-1"><strong>Brand: </strong>${brand}</p></div>
                                                        <div class="col-6"><p class="mb-1"><strong>Weight: </strong>${weight}</p></div>
                                                        <div class="col-12"><p class="mb-1"><strong>Dimensions: </strong>${dimText}</p></div>
                                                        <div class="col-12"><p class="mb-1"><strong>${returnPolicy}</strong></p></div>
                                                    </div>

                                                    <h6 class="fw-bold mt-4 mb-2">Reviews:</h6>
                                                    <div class="reviews-container">
                                                        ${reviewsHTML}
                                                    </div>
                                                </div>
                                            </div>

                                            <form action="/cart" method="post">
                                            <div class="modal-footer bg-light d-flex justify-content-between align-items-center">

                                                <div class="d-flex align-items-center">
                                                    <label for="qty-${id}" class="me-2 fw-bold text-muted small">Quantity:</label>
                                                    <input name="quantity" type="number" id="qty-${id}" class="form-control form-control-sm text-center" value="1" min="1" max="${stock}" style="width: 70px;">
                                                    <input type="hidden" name="index" value="${index}">
                                                </div>

                                                <div>
                                                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
                                                    <button type="submit" class="btn btn-success btn-sm px-3 fw-bold">Add to the Cart</button>
                                                </div>
                                            </div>
                                            </form>

                                        </div>
                                    </div>
                                </div>
                                </div>
                        </div>
                    </div>
                `;
            });

            containerProductsDiv.insertAdjacentHTML('beforeend', htmlString);
        };

        const fetchCertainProducts = () => {
            let search = searchInput.value.trim().toLowerCase();
            startingIndex = 0;
            endingIndex = 30;
            containerProductsDiv.innerHTML = "";
            loadMoreButton.disabled = false;
            loadMoreButton.textContent = "Load more products";

            if (search === "") {
                currentList = productsList.filter((product) => selectedValues.includes(product["category"]));
            } else {
                currentList = productsList.filter((product) => {
                    let safeTitle = product.title ? product.title.toLowerCase() : "";
                    let safeDesc = product.description ? product.description.toLowerCase() : "";
                    let safeBrand = product.brand ? product.brand.toLowerCase() : "";
                    let safeTags = product.tags ? product.tags.join(" ").toLowerCase() : "";
                    let matchesSearch = safeTitle.includes(search) ||
                                        safeDesc.includes(search) ||
                                        safeBrand.includes(search) ||
                                        safeTags.includes(search);
                    let matchesCategory = selectedValues.includes(product.category);
                    return matchesSearch && matchesCategory;
                });
            }

            displayProducts(currentList.slice(startingIndex, endingIndex));

            if (endingIndex >= currentList.length) {
                loadMoreButton.disabled = true;
                loadMoreButton.textContent = "No more products to display.";
            }
        }

        categories.forEach((category) => {
            categoriesContainer.innerHTML += `
                <div class="form-check form-check-inline" style="margin-right: 0rem; padding-left: 0rem;">
                <input type="checkbox" class="btn-check" name="category" id="category-${category}" value="${category}" autocomplete="off">
                <label class="btn btn-outline-success btn-sm" for="category-${category}">${category}</label>
                </div>
            `
        });

        const checkboxes = document.querySelectorAll("input[type=checkbox][name=category]");
        checkboxes.forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
            selected = Array.from(checkboxes).filter(i => i.checked).map(i => i.value);
            if (selected.length === 0) {
                selectedValues = categories;
            } else {
                selectedValues = selected;
            }
            fetchCertainProducts();
        });
        });

        loadMoreButton.addEventListener("click", fetchMoreProducts);
        displayProducts(productsList.slice(startingIndex, endingIndex));
        searchInput.addEventListener("input", fetchCertainProducts);
    </script>
{% endblock %}
