{% extends 'layout.html' %}

{% block title %}
    Log In
{% endblock %}

{% block body %}
    <div class="card shadow-sm bg-body-tertiary border-0 mx-auto mt-5" style="max-width: 400px;">
        <div class="card-body p-4 p-sm-5">
            <h3 class="card-title text-center mb-4">Welcome Back</h3>

            <form action="/login" method="post">
                <div class="form-floating mb-3">
                    <input autocomplete="off" autofocus class="form-control" id="username" name="username" placeholder="Username" type="text">
                    <label for="username">Username</label>
                </div>

                <div class="form-floating mb-5">
                    <input class="form-control" id="password" name="password" placeholder="Password" type="password">
                    <label for="password">Password</label>
                </div>

                <button class="btn btn-primary btn-md w-100 fw-bold" type="submit">Log In</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0">Don't have an account? <a href="/register" class="text-decoration-none">Register</a></p>
            </div>
        </div>
    </div>
{% endblock %}
